<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - Admin Dashboard</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Admin Dashboard</a></li>
                    <li class="breadcrumb-item active">Manage Bookings</li>
                </ol>
            </nav>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-tasks me-2" aria-hidden="true"></i>Pending Booking Requests</h2>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Student</th>
                                    <th>Room</th>
                                    <th>Time Slot</th>
                                    <th>Purpose</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="booking : ${bookings}">
                                    <td>
                                        <div class="fw-bold" th:text="${booking.userName}"></div>
                                        <small class="text-muted"
                                            th:text="${'Requested on ' + #temporals.format(booking.createdAt, 'dd MMM HH:mm')}"></small>
                                    </td>
                                    <td th:text="${booking.roomName}"></td>
                                    <td>
                                        <div
                                            th:text="${#temporals.format(booking.startAt, 'HH:mm') + ' - ' + #temporals.format(booking.endAt, 'HH:mm')}">
                                        </div>
                                        <small class="text-muted"
                                            th:text="${#temporals.format(booking.startAt, 'dd MMM yyyy')}"></small>
                                    </td>
                                    <td th:text="${booking.purpose}"></td>
                                    <td>
                                        <div class="d-flex gap-2">
                                            <form th:action="@{/admin/bookings/{id}/approve(id=${booking.id})}"
                                                method="post">
                                                <button type="submit" class="btn btn-sm btn-success">Approve</button>
                                            </form>
                                            <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                                th:data-bs-target="${'#rejectModal' + booking.id}">
                                                Reject
                                            </button>
                                        </div>

                                        <!-- Reject Modal -->
                                        <div class="modal fade" th:id="${'rejectModal' + booking.id}" tabindex="-1"
                                            aria-hidden="true">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <form th:action="@{/admin/bookings/{id}/reject(id=${booking.id})}"
                                                        method="post">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Reject Booking Request</h5>
                                                            <button type="button" class="btn-close"
                                                                data-bs-dismiss="modal" aria-label="Close"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <p>Provide a reason for rejecting this booking (optional):
                                                            </p>
                                                            <textarea name="reason" class="form-control" rows="3"
                                                                placeholder="e.g. Room needed for official maintenance"></textarea>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary"
                                                                data-bs-dismiss="modal">Cancel</button>
                                                            <button type="submit" class="btn btn-danger">Confirm
                                                                Reject</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(bookings)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="fas fa-check-circle fa-3x mb-3 d-block opacity-25"
                                            aria-hidden="true"></i>
                                        No pending booking requests.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
