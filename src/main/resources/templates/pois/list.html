<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Map - Campus Study Hub</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-geo-alt me-2"></i>Campus Map — Points of Interest</h2>
            <div>
                <a th:href="@{/pois}" class="btn btn-outline-light btn-sm me-1"
                    th:classappend="${filterCategory == null} ? 'active' : ''">All</a>
                <a th:href="@{/pois(category='BUILDING')}" class="btn btn-outline-light btn-sm me-1"
                    th:classappend="${filterCategory == 'BUILDING'} ? 'active' : ''">Buildings</a>
                <a th:href="@{/pois(category='LIBRARY')}" class="btn btn-outline-light btn-sm me-1"
                    th:classappend="${filterCategory == 'LIBRARY'} ? 'active' : ''">Library</a>
                <a th:href="@{/pois(category='LAB')}" class="btn btn-outline-light btn-sm me-1"
                    th:classappend="${filterCategory == 'LAB'} ? 'active' : ''">Labs</a>
                <a th:href="@{/pois(category='CANTEEN')}" class="btn btn-outline-light btn-sm me-1"
                    th:classappend="${filterCategory == 'CANTEEN'} ? 'active' : ''">Canteen</a>
                <a th:href="@{/pois/new}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-plus-lg me-1"></i>Add POI</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(pois)}" class="text-center text-muted py-5">
            <i class="bi bi-map" style="font-size:3rem"></i>
            <p class="mt-2">No points of interest added yet.</p>
        </div>

        <div class="row g-3">
            <div class="col-md-6 col-lg-4" th:each="poi : ${pois}">
                <div class="card glass-card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-info" th:text="${poi.category}">BUILDING</span>
                            <span class="text-muted small" th:if="${poi.floor}">
                                <i class="bi bi-layers me-1"></i><span th:text="${poi.floor}"></span>
                            </span>
                        </div>
                        <h5 class="card-title" th:text="${poi.name}">POI Name</h5>
                        <p class="card-text text-muted small" th:text="${poi.description}">Description</p>
                        <p class="mb-1" th:if="${poi.openingHours}">
                            <i class="bi bi-clock me-1"></i><span th:text="${poi.openingHours}"></span>
                        </p>
                        <p class="mb-1" th:if="${poi.latitude != null and poi.longitude != null}">
                            <i class="bi bi-pin-map me-1"></i>
                            <span th:text="${poi.latitude}"></span>, <span th:text="${poi.longitude}"></span>
                        </p>
                        <div class="d-flex gap-1 mt-2" sec:authorize="hasRole('ADMIN')">
                            <form th:action="@{/pois/{id}/delete(id=${poi.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 text-muted small">
            <i class="bi bi-info-circle me-1"></i>REST API available at <code>/pois/api</code> for mobile/AR
            integration.
        </div>
    </div>
</body>

</html>
