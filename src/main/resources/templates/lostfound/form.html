<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card glass-card">
                    <div class="card-body p-4">
                        <h3 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Report Lost / Found Item</h3>
                        <form th:action="@{/lost-found}" method="post" th:object="${item}">
                            <div class="mb-3">
                                <label class="form-label">Type</label>
                                <select class="form-select" th:field="*{type}" required>
                                    <option value="">-- Select --</option>
                                    <option value="LOST">I Lost Something</option>
                                    <option value="FOUND">I Found Something</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control" th:field="*{title}"
                                    placeholder="e.g. Blue backpack, Student ID card" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"
                                    placeholder="Describe the item, brand, color, etc."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" th:field="*{location}"
                                    placeholder="e.g. Library 2nd floor, Canteen">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contact Info</label>
                                <input type="text" class="form-control" th:field="*{contactInfo}"
                                    placeholder="Phone or email">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
</body>

</html>
