<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Item - Campus Study Hub</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card glass-card">
                    <div class="card-body p-4">
                        <h3 class="mb-4"><i class="bi bi-plus-circle me-2"></i>Report Lost / Found Item</h3>
                        <form th:action="@{/lost-found}" method="post" th:object="${item}">
                            <div class="mb-3">
                                <label class="form-label">Type</label>
                                <select class="form-select" th:field="*{type}" required="required">
                                    <option value="">-- Select --</option>
                                    <option value="LOST">I Lost Something</option>
                                    <option value="FOUND">I Found Something</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control" th:field="*{title}"
                                    placeholder="e.g. Blue backpack, Student ID card" required="required">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"
                                    placeholder="Describe the item, brand, color, etc."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" th:field="*{location}"
                                    placeholder="e.g. Library 2nd floor, Canteen">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contact Info</label>
                                <input type="text" class="form-control" th:field="*{contactInfo}"
                                    placeholder="Phone or email">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
