<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}"></head>

<body>
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card glass-card">
                    <div class="card-body p-4">
                        <h3 class="mb-4"><i class="bi bi-chat-left-text me-2"></i>Submit a Complaint</h3>
                        <form th:action="@{/complaints}" method="post" th:object="${complaint}">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" th:field="*{category}" required>
                                    <option value="">-- Select Category --</option>
                                    <option value="INFRASTRUCTURE">Infrastructure</option>
                                    <option value="ACADEMIC">Academic</option>
                                    <option value="HOSTEL">Hostel</option>
                                    <option value="CANTEEN">Canteen</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control" th:field="*{title}"
                                    placeholder="Brief summary of your complaint" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="5"
                                    placeholder="Describe the issue in detail..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Complaint</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="~{layout :: footer}"></footer>
    <script th:replace="~{layout :: scripts}"></script>
</body>

</html>
