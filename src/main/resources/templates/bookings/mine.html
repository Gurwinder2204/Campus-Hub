<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Campus Study Hub</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-clock me-2" aria-hidden="true"></i>My Room Bookings</h2>
                <a th:href="@{/bookings/new}" class="btn btn-primary">
                    <i class="fas fa-plus me-1" aria-hidden="true"></i> New Booking
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Room</th>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th>Status</th>
                                    <th>Purpose</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="booking : ${bookings}">
                                    <td class="fw-bold" th:text="${booking.roomName}"></td>
                                    <td th:text="${#temporals.format(booking.startAt, 'dd MMM yyyy HH:mm')}"></td>
                                    <td th:text="${#temporals.format(booking.endAt, 'dd MMM yyyy HH:mm')}"></td>
                                    <td>
                                        <span th:if="${booking.status == 'PENDING'}"
                                            class="badge bg-warning text-dark">PENDING</span>
                                        <span th:if="${booking.status == 'APPROVED'}"
                                            class="badge bg-success">APPROVED</span>
                                        <span th:if="${booking.status == 'REJECTED'}"
                                            class="badge bg-danger">REJECTED</span>
                                        <span th:if="${booking.status == 'CANCELLED'}"
                                            class="badge bg-secondary">CANCELLED</span>
                                    </td>
                                    <td th:text="${booking.purpose}"></td>
                                    <td>
                                        <form th:if="${booking.status == 'PENDING' || booking.status == 'APPROVED'}"
                                            th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post"
                                            onsubmit="return confirm('Are you sure you want to cancel this booking?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Cancel</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(bookings)}">
                                    <td colspan="6" class="text-center py-4 text-muted">You have no bookings yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
