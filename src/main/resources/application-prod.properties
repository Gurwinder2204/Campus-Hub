# ============================================================
# Campus Study Hub - Production Configuration Overrides
# ============================================================

# Security: Mandatory environment variables (no defaults)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

# Application Lifecycle
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.generate-ddl=false

# Logging: Higher levels for production
logging.level.root=WARN
logging.level.com.campusstudyhub=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Performance
spring.thymeleaf.cache=true

# Actuator: Secure endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
