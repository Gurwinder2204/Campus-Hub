version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campus-hub-db
    environment:
      POSTGRES_DB: campus_hub
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_user -d campus_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: campus-hub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: .
    container_name: campus-hub-backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/campus_hub
      DB_USERNAME: campus_user
      DB_PASSWORD: campus_password
      PORT: 8080
    ports:
      - "8080:8080"
      - "8081:8081" # Management port for metrics/prometheus
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: campus-hub-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: campus-hub-grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
